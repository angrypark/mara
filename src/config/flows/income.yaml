# Income Flow Configuration
# 현금흐름 창출 - 은퇴 자산 보호 및 안정적 수익

flow_name: income
description: "매월 안정적 현금흐름, 원금 보존, 인플레이션 헤지"

# Agent 실행 순서
pipeline:
  - user_profile
  - data
  - perspective
  - validation
  - strategy

# Perspective Agent 가중치
agent_weights:
  ray_dalio: 0.35                # 핵심 — All Weather 전략으로 안정성 확보
  paul_tudor_jones: 0.30         # 방어 우선 — 리스크 관리가 소득 보호의 핵심
  george_soros: 0.20             # 시장 괴리 감지로 리스크 조기 경보
  stanley_druckenmiller: 0.15    # 제한적 활용 — 확신 높은 소득형 기회만

# 포트폴리오 제약 조건
constraints:
  max_single_sector: 0.30
  max_single_position: 0.10
  max_drawdown: 0.20        # 은퇴 자산이라 보수적
  min_cash_ratio: 0.15
  max_cash_ratio: 0.25
  min_dividend_yield: 0.03  # 배당 수익률 3% 이상

# 리밸런싱 방식
rebalancing:
  preferred_method: calendar_based    # 분기 1회 정기 리밸런싱
  threshold: 0.05                      # 5% 괴리 시 리밸런싱
  frequency: quarterly

# 포커스
focus:
  - stable_income
  - inflation_hedge
  - capital_preservation

# Retrospection 설정
retrospection:
  frequency: monthly
  run_day: 15
  auto_adjust_weights: false
  learning_rate: 0.05

# Output
output:
  report: "outputs/reports/{date}_income_report.md"
  portfolio: "outputs/portfolios/{date}_income_portfolio.md"
