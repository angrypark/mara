# Growth Flow Configuration
# 성장 극대화 - 근로소득 있는 공격적 투자자

flow_name: growth
description: "수익 극대화, 집중 베팅 활용, 높은 변동성 허용"

# Agent 실행 순서
pipeline:
  - user_profile
  - data
  - perspective
  - validation
  - strategy

# Perspective Agent 가중치
agent_weights:
  stanley_druckenmiller: 0.35    # 핵심 — 집중 베팅으로 성장 극대화
  george_soros: 0.30             # 트렌드 초기 포착, 시장 괴리 활용
  paul_tudor_jones: 0.20         # 리스크 관리 (성장에서도 방어 필요)
  ray_dalio: 0.15                # 경제 사이클 기본 체크

# 포트폴리오 제약 조건
constraints:
  max_single_sector: 0.40
  max_single_position: 0.15
  max_drawdown: 0.35
  min_cash_ratio: 0.05
  max_cash_ratio: 0.30

# 리밸런싱 방식
rebalancing:
  preferred_method: cash_flow_based   # 월급으로 비중 조정, 매도 최소화
  threshold: 0.05                      # 5% 괴리 시 리밸런싱
  vix_trigger: 30                      # VIX 30 이상 시 기회 매수

# 테마 포커스
themes:
  - ai_infrastructure
  - renewable_energy
  - semiconductor

# Retrospection 설정
retrospection:
  frequency: monthly
  run_day: 15
  auto_adjust_weights: false    # 자동 조정 off, 제안만
  learning_rate: 0.05

# Output
output:
  report: "outputs/reports/{date}_growth_report.md"
  portfolio: "outputs/portfolios/{date}_growth_portfolio.md"
